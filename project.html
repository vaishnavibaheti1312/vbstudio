  <body class="hp-body" data-page="portfolio">

    <!-- Project data + carousel logic -->

          images: [
            'img/assets/project3/BEDROOM VIEW 1.jpg',

        4: {
          name: 'The Zen Oasis',

          description: 'Located within a sprawling 2900 sqft carpet area, The Zen Oasis is a 4BHK residence that seamlessly blends contemporary aesthetics with a warm and inviting ambiance. Natural materials, rich textures, and a warm colour palette create a sanctuary of comfort and elegance.',

        6: {
          name: 'Dixit Residence',
          year: '2022',
          description: 'The Dixit Residence is a thoughtfully curated family home where warmth, function, and understated elegance seamlessly converge. Rich textures, bespoke joinery, and a carefully considered palette reflect a deeply personal vision of refined living — a home that grows more beautiful with every day spent within its walls.',
          images: [
            'img/assets/project6/E_MKGs_HR-2.jpg',

      /* ── Read ?project= from URL ── */
      function getProjectId() {
        var params = new URLSearchParams(window.location.search);
        var id = parseInt(params.get('project'), 10);
        return PROJECTS[id] ? id : 1;
      }

      /* ── Build carousel ── */
      (function () {
        var id      = getProjectId();
        var proj    = PROJECTS[id];
        var track   = document.getElementById('pr-track');
        var dotsEl  = document.getElementById('pr-dots');
        var counter = document.getElementById('pr-counter');
        var total   = proj.images.length;
        var current = 0;

        /* Page title */
        document.getElementById('pr-page-title').textContent = proj.name + ' — VB Studio';

        /* Build slides */
        proj.images.forEach(function (src, i) {
          var slide = document.createElement('div');
          slide.className = 'pr-carousel__slide';
          slide.setAttribute('role', 'listitem');
          slide.setAttribute('aria-label', 'Image ' + (i + 1) + ' of ' + total);

          var img = document.createElement('img');
          img.className = 'pr-carousel__img';
          img.src = src;
          img.alt = proj.name + ' — image ' + (i + 1);
          img.loading = i === 0 ? 'eager' : 'lazy';
          img.decoding = 'async';
          if (i === 0) img.fetchPriority = 'high';

          var overlay = document.createElement('div');
          overlay.className = 'pr-carousel__overlay';

          slide.appendChild(img);
          slide.appendChild(overlay);

          /* Text block only on first slide */
          if (i === 0) {
            var textBlock = document.createElement('div');
            textBlock.className = 'pr-carousel__text';
            textBlock.innerHTML =
              '<span class="pr-carousel__year">' + proj.year + '</span>' +
              '<h1 class="pr-carousel__title">' + proj.name + '</h1>' +
              '<p class="pr-carousel__desc">' + proj.description + '</p>';
            slide.appendChild(textBlock);
          }

          track.appendChild(slide);
        });

        /* Build dots */
        proj.images.forEach(function (_, i) {
          var dot = document.createElement('button');
          dot.className = 'pr-carousel__dot' + (i === 0 ? ' pr-carousel__dot--active' : '');
          dot.setAttribute('role', 'tab');
          dot.setAttribute('aria-label', 'Go to image ' + (i + 1));
          dot.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
          dot.addEventListener('click', function () { goTo(i); });
          dotsEl.appendChild(dot);
        });

        /* Navigate */
        function goTo(index) {
          current = (index + total) % total;
          track.style.transform = 'translateX(-' + (current * 100) + '%)';
          counter.textContent = (current + 1) + ' / ' + total;

          var dots = dotsEl.querySelectorAll('.pr-carousel__dot');
          dots.forEach(function (d, i) {
            d.classList.toggle('pr-carousel__dot--active', i === current);
            d.setAttribute('aria-selected', i === current ? 'true' : 'false');
          });
        }

        /* Auto-play: advance every 3 s; pause on hover/focus/touch */
        var autoTimer = setInterval(function () { goTo(current + 1); }, 3000);

        function resetTimer() {
          clearInterval(autoTimer);
          autoTimer = setInterval(function () { goTo(current + 1); }, 3000);
        }

        /* Pause only while mouse is actively moving; resume shortly after it stops */
        var mouseMoveTimeout = null;
        var carousel = document.getElementById('pr-carousel');
        carousel.addEventListener('mousemove', function () {
          clearInterval(autoTimer);
          clearTimeout(mouseMoveTimeout);
          mouseMoveTimeout = setTimeout(function () { resetTimer(); }, 800);
        });
        carousel.addEventListener('mouseleave', function () {
          clearTimeout(mouseMoveTimeout);
          resetTimer();
        });
        carousel.addEventListener('focusin',    function () { clearInterval(autoTimer); });
        carousel.addEventListener('focusout',   function () { resetTimer(); });

        document.getElementById('pr-prev').addEventListener('click', function () { goTo(current - 1); resetTimer(); });
        document.getElementById('pr-next').addEventListener('click', function () { goTo(current + 1); resetTimer(); });

        /* Keyboard navigation */
        document.addEventListener('keydown', function (e) {
          if (e.key === 'ArrowLeft')  { goTo(current - 1); resetTimer(); }
          if (e.key === 'ArrowRight') { goTo(current + 1); resetTimer(); }
        });

        /* Touch / swipe */
        var touchStartX = null;
        carousel.addEventListener('touchstart', function (e) {
          touchStartX = e.changedTouches[0].clientX;
          clearInterval(autoTimer);
        }, { passive: true });
        carousel.addEventListener('touchend', function (e) {
          if (touchStartX === null) return;
          var dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
          touchStartX = null;
          resetTimer();
        }, { passive: true });

        /* Initial counter */
        counter.textContent = '1 / ' + total;
      })();
    </script>
